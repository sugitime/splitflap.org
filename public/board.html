<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1.0,user-scalable=no"
    />
    <title>Split Flap Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@100;300;400;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Create and control a retro split-flap display board in your browser. splitflap.org Board lets you build messages, preview animations, and connect your phone as a remote."
    />

    <link rel="icon" href="favicon.png" type="image/png" />
    <link rel="shortcut icon" href="favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="favicon.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="splitflap.org | Board" />
    <meta
      property="og:description"
      content="Create and control a retro split-flap display board in your browser."
    />
    <meta property="og:image" content="image.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="splitflap.org | Board" />
    <meta
      name="twitter:description"
      content="Create and control a retro split-flap display board in your browser."
    />
    <meta name="twitter:image" content="image.png" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      html,
      body {
        width: 6912px;
        height: 1200px;
        overflow: hidden;
        background: #000;
        font-family: "Inter", sans-serif;
        user-select: none;
      }

      #submit-qr-panel {
        position: fixed;
        left: 0;
        top: 0;
        width: 1200px;
        height: 1200px;
        z-index: 60;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        background: rgba(0, 0, 0, 0.92);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        pointer-events: none;
      }
      #submit-qr-panel .submit-qr-label {
        flex: 0 0 auto;
        padding: 20px 24px 12px;
        font-size: 22px;
        color: rgba(255, 255, 255, 0.55);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-weight: 600;
        text-align: center;
      }
      #submit-qr-container {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px 24px 24px;
      }
      #submit-qr-container .submit-qr-frame {
        background: #fff;
        padding: 16px;
        border-radius: 16px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #submit-qr-container canvas {
        display: block;
      }

      /* Board */
      .board-area {
        margin-left: 1200px;
        width: 5712px;
        height: 1200px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }
      #vestaboard-wrapper {
        position: relative;
        transform-origin: center center;
        transition: opacity 0.25s ease;
      }
      #vestaboard-wrapper.fading {
        opacity: 0;
      }

      /* Structural */
      .rocker-switch * {
        box-sizing: border-box;
      }
      .rocker-switch {
        position: relative;
        will-change: transform;
      }
      .bezel,
      .bezel-highlight,
      .recessed-hole-stroke,
      .recessed-hole-bg,
      .rocker-wrapper-top,
      .rocker-wrapper-bot,
      .rocker-wrapper-falling,
      .rocker-split-overlay,
      .ridges {
        position: absolute;
      }
      .bezel-highlight {
        pointer-events: none;
      }
      .rocker-top,
      .rocker-bot,
      .ridge {
        width: 100%;
        box-sizing: border-box;
      }
      .rocker-top,
      .rocker-bot {
        height: 100%;
      }
      .ridges {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .rocker-scale-wrapper {
        contain: layout style paint;
      }

    </style>
    <style id="dynamic-board-css"></style>
  </head>
  <body>
    <div class="board-area" id="board-area">
      <div id="vestaboard-wrapper"></div>
    </div>

    <div id="submit-qr-panel">
      <div class="submit-qr-label">Submit a message</div>
      <div id="submit-qr-container"></div>
    </div>

    <script>
      const COLOR_MAP = {
        "🟥": "#e02424",
        "🟧": "#f97316",
        "🟨": "#eab308",
        "🟩": "#16a34a",
        "🟦": "#2563eb",
        "🟪": "#9333ea",
        "⬜": "#ffffff",
      };
      const SPOOL = Array.from(
        " ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%&*()-+=:;',./?",
      );
      Object.keys(COLOR_MAP).forEach((e) => SPOOL.push(e));
      function spoolIndexOf(ch) {
        const i = SPOOL.indexOf(ch);
        return i !== -1 ? i : 0;
      }

      const S = {
        animDuration: 360,
        animPerspective: 3000,
        animStagger: 40,
        animEasing: "ease-in-out",
        msgDelay: 20000,
        fastSpeed: 25,
        loopSequence: true,
        soundVolume: 0.8,
        soundRate: 1.5,
        cols: 96,
        rows: 5,
        scale: 0.22,
        gridGap: 11,
        fontFamily: "'Roboto Mono', monospace",
        fontSize: 247,
        fontWeight: 300,
        fontX: 0,
        fontY: -52,
        fontColor: "#ffffff",
        boardPad: 13,
        boardShadow: 0.4,
        boardRadius: 6,
        boardBg: "#0f0f0f",
        previewBg: "#000000",
        width: 250,
        height: 540,
        split: 194,
        pinch: 14,
        pinchHeight: 54,
        pinchSlope: 7,
        outerRadius: 30,
        bezelRadius: 30,
        radius: 24,
        shadow: 0,
        padBezel: 10,
        padHole: 24,
        gap: 7,
        highlightInset: 0,
        strokeW: 0,
        ridgeCount: 7,
        ridgeHeight: 7,
        ridgeGap: 1,
        ridgeRadius: 20,
        ridgeShadow: 0,
        ridgeBottom: 0,
        ridgeMargin: 0,
        r1: "#000000",
        r2: "#000000",
        r3: "#000000",
        r4: "#000000",
        c_bg: "#0f0f0f",
        c_holeStroke: "#000000",
        c_holeBg: "#040404",
        g_bezel1: "#000000",
        g_bezel2: "#000000",
        g_top1: "#0f0f0f",
        g_top2: "#0f0f0f",
        g_bot1: "#0f0f0f",
        g_bot2: "#0f0f0f",
        g_bot3: "#0f0f0f",
        autoFit: true,
      };
      let publicDisplayMs = 20000,
        publicQueuePlaying = false,
        publicQueueTimer = null;

      const boardWrapper = document.getElementById("vestaboard-wrapper");
      const boardArea = document.getElementById("board-area");
      const dynamicCSS = document.getElementById("dynamic-board-css");

      // ═══════════════════════════════════
      // AUDIO
      // ═══════════════════════════════════
      let audioCtx = null,
        clickBuffer = null,
        wavLoaded = false,
        activeAudioCount = 0,
        lastClickMs = 0;
      const MAX_CONCURRENT_AUDIO = 8,
        MIN_CLICK_INTERVAL = 25;
      function getAudioCtx() {
        if (!audioCtx)
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === "suspended") audioCtx.resume();
        return audioCtx;
      }
      function loadClickWav() {
        const ctx = getAudioCtx();
        fetch("click.wav")
          .then((r) => {
            if (!r.ok) throw 0;
            return r.arrayBuffer();
          })
          .then((b) => ctx.decodeAudioData(b))
          .then((d) => {
            clickBuffer = d;
            wavLoaded = true;
          })
          .catch(() => {});
      }
      function synthClick(vol, rate) {
        const ctx = getAudioCtx(),
          now = ctx.currentTime,
          dur = 0.035;
        const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate),
          d = buf.getChannelData(0);
        const freq = 3500 * rate;
        for (let i = 0; i < d.length; i++) {
          const t = i / ctx.sampleRate;
          d[i] =
            (Math.random() * 2 -
              1 +
              Math.sin(2 * Math.PI * freq * 1.5 * t) * 0.3) *
            Math.exp(-t / 0.003);
        }
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const hp = ctx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.value = freq;
        hp.Q.value = 1.5;
        const lp = ctx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = Math.min(freq * 3, 12000);
        lp.Q.value = 0.7;
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(vol, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        src.connect(hp);
        hp.connect(lp);
        lp.connect(gain);
        gain.connect(ctx.destination);
        activeAudioCount++;
        src.onended = () => {
          activeAudioCount--;
        };
        src.start(now);
        src.stop(now + dur);
      }
      function playClick(vol, rate) {
        const now = performance.now();
        if (
          now - lastClickMs < MIN_CLICK_INTERVAL ||
          activeAudioCount >= MAX_CONCURRENT_AUDIO
        )
          return;
        lastClickMs = now;
        const ctx = getAudioCtx();
        if (wavLoaded && clickBuffer) {
          const src = ctx.createBufferSource();
          src.buffer = clickBuffer;
          src.playbackRate.value = rate + (Math.random() * 0.4 - 0.2);
          const gain = ctx.createGain();
          gain.gain.value = vol;
          src.connect(gain);
          gain.connect(ctx.destination);
          activeAudioCount++;
          src.onended = () => {
            activeAudioCount--;
          };
          src.start();
        } else synthClick(vol, rate);
      }

      // ═══════════════════════════════════
      // BOARD
      // ═══════════════════════════════════
      let currentChars = [],
        isFlipping = false,
        cellCache = [];
      function wrapMessageToRows(msg, cols, maxRows = Infinity) {
        const result = [];
        for (const line of msg.split("\n")) {
          const chars = Array.from(line);
          if (chars.length === 0) {
            result.push("");
            if (result.length >= maxRows) return result.slice(0, maxRows);
            continue;
          }
          for (let i = 0; i < chars.length; i += cols) {
            result.push(chars.slice(i, i + cols).join(""));
            if (result.length >= maxRows) return result.slice(0, maxRows);
          }
        }
        return result;
      }
      function messageToGrid(msg) {
        const lines = wrapMessageToRows(msg, S.cols, S.rows),
          g = [];
        for (let r = 0; r < S.rows; r++) {
          let c = Array.from((lines[r] || "").toUpperCase());
          while (c.length < S.cols) c.push(" ");
          g.push(...c.slice(0, S.cols));
        }
        return g;
      }
      function blankGrid() {
        return Array(S.cols * S.rows).fill(" ");
      }
      function renderBoard() {
        const total = S.cols * S.rows;
        if (currentChars.length !== total) currentChars = blankGrid();
        let ridges = "";
        for (let i = 0; i < S.ridgeCount; i++)
          ridges += '<div class="ridge"></div>';
        let html = '<div class="vestaboard-grid">';
        currentChars.forEach((ch, i) => {
          const isC = !!COLOR_MAP[ch],
            dc = isC ? "" : ch === " " ? "" : ch,
            bg = isC ? ` style="background:${COLOR_MAP[ch]}"` : "";
          html += `<div class="rocker-scale-wrapper"><div class="rocker-switch" data-idx="${i}"><div class="bezel"><div class="bezel-highlight"></div></div><div class="recessed-hole-stroke"><div class="recessed-hole-bg"><div class="rocker-wrapper-top"><div class="rocker-top" data-role="top-bg"${bg}></div><div class="rocker-text rocker-text-top" data-role="static-top">${dc}</div></div><div class="rocker-wrapper-bot"><div class="rocker-bot" data-role="bot-bg"${bg}><div class="ridges">${ridges}</div></div><div class="rocker-text rocker-text-bot" data-role="static-bot">${dc}</div></div><div class="rocker-wrapper-falling"><div class="rocker-falling-front"><div class="rocker-top" data-role="falling-bg"${bg}></div><div class="rocker-text rocker-text-top" data-role="falling-txt">${dc}</div></div></div><div class="rocker-split-overlay"></div></div></div></div></div>`;
        });
        html += "</div>";
        boardWrapper.innerHTML = html;
        cellCache = [];
        for (let i = 0; i < total; i++) {
          const sw = boardWrapper.querySelector(
            `.rocker-switch[data-idx="${i}"]`,
          );
          if (!sw) {
            cellCache.push(null);
            continue;
          }
          cellCache.push({
            sTop: sw.querySelector('[data-role="static-top"]'),
            sBtm: sw.querySelector('[data-role="static-bot"]'),
            fTxt: sw.querySelector('[data-role="falling-txt"]'),
            topBg: sw.querySelector('[data-role="top-bg"]'),
            botBg: sw.querySelector('[data-role="bot-bg"]'),
            fallBg: sw.querySelector('[data-role="falling-bg"]'),
            wrap: sw.querySelector(".rocker-wrapper-falling"),
          });
        }
      }

      // ═══════════════════════════════════
      // ANIMATION
      // ═══════════════════════════════════
      let animQueue = [],
        animRAF = null,
        animT0 = 0,
        animTarget = null,
        animDoneCb = null;
      function scheduleAction(t, fn) {
        animQueue.push({ time: t, fn });
      }
      function animTick(now) {
        const el = now - animT0;
        let i = 0;
        while (i < animQueue.length && animQueue[i].time <= el) {
          animQueue[i].fn();
          i++;
        }
        if (i > 0) animQueue.splice(0, i);
        if (animQueue.length > 0) animRAF = requestAnimationFrame(animTick);
        else {
          animRAF = null;
          currentChars = [...animTarget];
          isFlipping = false;
          if (animDoneCb) animDoneCb();
        }
      }
      function startAnimLoop() {
        animQueue.sort((a, b) => a.time - b.time);
        animT0 = performance.now();
        animRAF = requestAnimationFrame(animTick);
      }
      function cancelAnimLoop() {
        if (animRAF) {
          cancelAnimationFrame(animRAF);
          animRAF = null;
        }
        animQueue = [];
        cellCache.forEach((c) => {
          if (c && c.wrap && c.wrap._anim)
            try {
              c.wrap._anim.cancel();
            } catch (_) {}
        });
      }
      function getDelay(idx) {
        return (
          (idx % S.cols) * S.animStagger +
          Math.floor(idx / S.cols) * S.animStagger * 1.5
        );
      }

      function buildCellSchedule(idx, oldChar, newChar) {
        const c = cellCache[idx];
        if (!c) return 0;
        const delay = getDelay(idx);

        let oi = spoolIndexOf(oldChar || " "),
          ni = spoolIndexOf(newChar || " ");
        let steps = ni - oi;
        if (steps < 0) steps += SPOOL.length;
        if (steps === 0 && oldChar !== newChar) steps = 1;

        const path = [];
        for (let i = 1; i <= steps; i++)
          path.push(SPOOL[(oi + i) % SPOOL.length]);
        if (!path.length || path[path.length - 1] !== (newChar || " "))
          path.push(newChar || " ");

        let t = delay;
        // Reference the correct state object name:
        // - board.html / custom-board.html use `S`
        // - index.html uses `state`
        // Adjust the variable name to match your file, or use a
        // local alias like: const _S = (typeof S !== 'undefined') ? S : state;
        const _S = typeof S !== "undefined" ? S : state;
        const FAST = _S.fastSpeed;
        const FINAL = _S.animDuration;

        path.forEach((char, i) => {
          const isLast = i === path.length - 1;
          const speed = isLast ? FINAL : FAST;
          const easing = isLast ? _S.animEasing : "linear";

          const isColor = !!(
            typeof COLOR_MAP !== "undefined" ? COLOR_MAP : colorMap
          )[char];
          const cmap = typeof COLOR_MAP !== "undefined" ? COLOR_MAP : colorMap;
          const dc = isColor ? "" : char === " " ? "" : char;
          const bg = isColor ? cmap[char] : "";

          const prev = i === 0 ? oldChar || " " : path[i - 1];
          const prevIsColor = !!cmap[prev];
          const pdc = prevIsColor ? "" : prev === " " ? "" : prev;
          const pbg = prevIsColor ? cmap[prev] : "";

          const capturedT = t;
          const capturedSpeed = speed;

          if (!isLast) {
            // ── INTERMEDIATE STEP: instant DOM swap, NO Animation object ──
            scheduleAction(capturedT, () => {
              // Update top half to new char
              if (c.sTop) c.sTop.textContent = dc;
              if (c.topBg) c.topBg.style.background = bg;
              // Update bottom half to new char (no half-flip delay needed
              // at 25ms — it's visually instant anyway)
              if (c.sBtm) c.sBtm.textContent = dc;
              if (c.botBg) c.botBg.style.background = bg;
              // Audio: only every 3rd intermediate
              if (i % 3 === 0) {
                if (typeof playClick === "function") {
                  // index.html's playClick takes no args
                  // board.html / custom-board.html take (vol, rate)
                  if (playClick.length === 0) playClick();
                  else playClick(_S.soundVolume, _S.soundRate);
                }
              }
            });
          } else {
            // ── FINAL STEP: full falling-flap animation ──
            scheduleAction(capturedT, () => {
              if (c.sTop) c.sTop.textContent = dc;
              if (c.topBg) c.topBg.style.background = bg;
              if (c.fTxt) c.fTxt.textContent = pdc;
              if (c.fallBg) c.fallBg.style.background = pbg;

              if (c.wrap) {
                if (c.wrap._anim)
                  try {
                    c.wrap._anim.cancel();
                  } catch (_) {}
                c.wrap.style.opacity = "1";
                c.wrap._anim = c.wrap.animate(
                  [
                    { transform: "rotateX(0deg)", opacity: 1 },
                    { transform: "rotateX(-90deg)", opacity: 0 },
                  ],
                  {
                    duration: capturedSpeed,
                    easing: easing === "linear" ? "linear" : easing,
                    fill: "forwards",
                  },
                );
              }
              // Always play click on final land
              if (typeof playClick === "function") {
                if (playClick.length === 0) playClick();
                else playClick(_S.soundVolume, _S.soundRate);
              }
            });

            // Halfway: update bottom half
            scheduleAction(capturedT + capturedSpeed * 0.5, () => {
              if (c.sBtm) c.sBtm.textContent = dc;
              if (c.botBg) c.botBg.style.background = bg;
            });

            // End: clean up falling flap
            scheduleAction(capturedT + capturedSpeed, () => {
              if (c.wrap) {
                if (c.wrap._anim)
                  try {
                    c.wrap._anim.cancel();
                  } catch (_) {}
                c.wrap.style.opacity = "0";
                c.wrap.style.transform = "";
              }
              if (c.fTxt) c.fTxt.textContent = dc;
              if (c.fallBg) c.fallBg.style.background = bg;
            });
          }

          t += speed;
        });

        return t;
      }
      function flipToTarget(target, onDone) {
        if (isFlipping) {
          if (onDone) onDone();
          return;
        }
        isFlipping = true;
        const total = S.cols * S.rows;
        if (currentChars.length !== total) currentChars = blankGrid();
        const changed = [];
        for (let i = 0; i < total; i++)
          if (currentChars[i] !== target[i]) changed.push(i);
        if (!changed.length) {
          isFlipping = false;
          if (onDone) onDone();
          return;
        }
        cancelAnimLoop();
        animTarget = target;
        animDoneCb = onDone || null;
        animQueue = [];
        let mx = 0;
        changed.forEach((idx) => {
          const e = buildCellSchedule(idx, currentChars[idx], target[idx]);
          if (e > mx) mx = e;
        });
        scheduleAction(mx + 50, () => {});
        startAnimLoop();
      }

      // ═══════════════════════════════════
      // CSS BUILDER
      // ═══════════════════════════════════
      function buildCornerArcs(w, h, r) {
        const p = (v) => v.toFixed(1) + "px";
        return {
          tl: [
            `0px ${p(r)}`,
            `${p(r * 0.05)} ${p(r * 0.65)}`,
            `${p(r * 0.25)} ${p(r * 0.25)}`,
            `${p(r * 0.65)} ${p(r * 0.05)}`,
            `${p(r)} 0px`,
          ],
          tr: [
            `${p(w - r)} 0px`,
            `${p(w - r * 0.65)} ${p(r * 0.05)}`,
            `${p(w - r * 0.25)} ${p(r * 0.25)}`,
            `${p(w - r * 0.05)} ${p(r * 0.65)}`,
            `${p(w)} ${p(r)}`,
          ],
          br: [
            `${p(w)} ${p(h - r)}`,
            `${p(w - r * 0.05)} ${p(h - r * 0.65)}`,
            `${p(w - r * 0.25)} ${p(h - r * 0.25)}`,
            `${p(w - r * 0.65)} ${p(h - r * 0.05)}`,
            `${p(w - r)} ${p(h)}`,
          ],
          bl: [
            `${p(r)} ${p(h)}`,
            `${p(r * 0.65)} ${p(h - r * 0.05)}`,
            `${p(r * 0.25)} ${p(h - r * 0.25)}`,
            `${p(r * 0.05)} ${p(h - r * 0.65)}`,
            `0px ${p(h - r)}`,
          ],
        };
      }
      function buildDynamicCSS() {
        const s = S,
          hw = s.width - s.padHole * 2,
          hh = s.height - s.padHole * 2 + 10,
          ihw = hw - s.strokeW * 2,
          ihh = hh - s.strokeW * 2,
          ir = Math.max(0, s.radius - s.strokeW);
        const py1 = Math.max(s.radius, s.split - s.pinchHeight - s.pinchSlope),
          py2 = s.split - s.pinchHeight,
          py3 = s.split + s.gap + s.pinchHeight,
          py4 = Math.min(
            hh - s.radius,
            s.split + s.gap + s.pinchHeight + s.pinchSlope,
          );
        const c = buildCornerArcs(hw, hh, s.radius),
          ic = buildCornerArcs(ihw, ihh, ir);
        const holeClip = `polygon(${c.tl},${c.tr},${hw}px ${py1}px,${hw - s.pinch}px ${py2}px,${hw - s.pinch}px ${py3}px,${hw}px ${py4}px,${c.br},${c.bl},0px ${py4}px,${s.pinch}px ${py3}px,${s.pinch}px ${py2}px,0px ${py1}px)`;
        const ipy1 = Math.max(ir, py1 - s.strokeW),
          ipy2 = py2 - s.strokeW,
          ipy3 = py3 - s.strokeW,
          ipy4 = Math.min(ihh - ir, py4 - s.strokeW);
        const holeBgClip = `polygon(${ic.tl},${ic.tr},${ihw}px ${ipy1}px,${ihw - s.pinch}px ${ipy2}px,${ihw - s.pinch}px ${ipy3}px,${ihw}px ${ipy4}px,${ic.br},${ic.bl},0px ${ipy4}px,${s.pinch}px ${ipy3}px,${s.pinch}px ${ipy2}px,0px ${ipy1}px)`;
        const topH = s.split - s.strokeW,
          topClip = `polygon(${ic.tl},${ic.tr},${ihw}px ${ipy1}px,${ihw - s.pinch}px ${ipy2}px,${ihw - s.pinch}px ${topH}px,${s.pinch}px ${topH}px,${s.pinch}px ${ipy2}px,0px ${ipy1}px)`;
        const botH = ihh - topH - s.gap,
          lpy3 = s.pinchHeight,
          lpy4 = s.pinchHeight + s.pinchSlope;
        const botClip = `polygon(${s.pinch}px 0px,${ihw - s.pinch}px 0px,${ihw - s.pinch}px ${lpy3}px,${ihw}px ${lpy4}px,${ic.br},${ic.bl},0px ${lpy4}px,${s.pinch}px ${lpy3}px)`;
        const rh = (v) =>
          Math.round(v * 255)
            .toString(16)
            .padStart(2, "0");
        return `.rocker-switch{width:${s.width}px;height:${s.height}px;border-radius:${s.outerRadius}px;background-color:${s.c_bg};${s.shadow > 0 ? `filter:drop-shadow(0 20px 30px rgba(0,0,0,${s.shadow}));` : ""}transform-style:preserve-3d}.bezel{left:${s.padBezel}px;top:${s.padBezel - 7}px;width:${s.width - s.padBezel * 2}px;height:${s.height - s.padBezel * 2 + 10}px;border-radius:${s.bezelRadius}px;background:linear-gradient(to bottom,${s.g_bezel1},${s.g_bezel2})}.bezel-highlight{inset:${s.highlightInset}px;border:${s.highlightInset > 0 ? "1px" : "0px"} solid rgba(255,255,255,.05);border-radius:${Math.max(0, s.bezelRadius - s.highlightInset)}px}.recessed-hole-stroke{left:${s.padHole}px;top:${s.padHole - 5}px;width:${hw}px;height:${hh}px;background-color:${s.c_holeStroke};-webkit-clip-path:${holeClip};clip-path:${holeClip}}.recessed-hole-bg{left:${s.strokeW}px;top:${s.strokeW}px;width:${ihw}px;height:${ihh}px;background-color:${s.c_holeBg};-webkit-clip-path:${holeBgClip};clip-path:${holeBgClip}}.rocker-wrapper-top{left:0;top:0;width:${ihw}px;height:${topH}px;overflow:hidden}.rocker-top{background:linear-gradient(to bottom,${s.g_top1},${s.g_top2});-webkit-clip-path:${topClip};clip-path:${topClip};transition:background 60ms}.rocker-wrapper-bot{left:0;top:${topH + s.gap}px;width:${ihw}px;height:${botH}px;overflow:hidden}.rocker-bot{background:linear-gradient(to bottom,${s.g_bot1} 0%,${s.g_bot2} 60%,${s.g_bot3} 100%);-webkit-clip-path:${botClip};clip-path:${botClip};transition:background 60ms}.rocker-wrapper-falling{left:0;top:0;width:${ihw}px;height:${topH}px;transform-origin:bottom center;z-index:5;transform-style:preserve-3d;opacity:0;pointer-events:none}.rocker-falling-front{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;-webkit-clip-path:${topClip};clip-path:${topClip};overflow:hidden}.rocker-split-overlay{position:absolute;left:0;width:${ihw}px;top:${topH}px;height:${s.gap}px;background-color:${s.c_holeBg};z-index:20;pointer-events:none;box-shadow:0 -1px 2px rgba(0,0,0,.9),0 1px 2px rgba(0,0,0,.9)}.ridges{bottom:${s.ridgeBottom}px;left:${s.ridgeMargin}px;width:calc(100% - ${s.ridgeMargin * 2}px);height:${s.ridgeHeight * s.ridgeCount + s.ridgeGap * (s.ridgeCount - 1)}px}.ridge{height:${s.ridgeHeight}px;margin-bottom:${s.ridgeGap}px;border-radius:${s.ridgeRadius}px;background:linear-gradient(to bottom,${s.r1}${rh(s.ridgeShadow)} 0%,${s.r2}05 20%,${s.r3}66 70%,${s.r4}e6 100%);border-top:${s.ridgeShadow > 0 ? "1px solid rgba(255,255,255," + s.ridgeShadow + ")" : "none"}}.vestaboard-grid{display:grid;grid-template-columns:repeat(${s.cols},auto);gap:${s.gridGap}px;padding:${s.boardPad}px;background-color:${s.boardBg};${s.boardShadow > 0 ? `box-shadow:0 10px 30px -5px rgba(0,0,0,${s.boardShadow}),0 4px 10px rgba(0,0,0,${s.boardShadow * 0.5});` : ""}border-radius:${s.boardRadius}px}.rocker-scale-wrapper{perspective:${s.animPerspective}px;width:calc(${s.width}px*${s.scale});height:calc(${s.height}px*${s.scale});position:relative}.rocker-switch{transform:scale(${s.scale});transform-origin:top left}.rocker-text{position:absolute;width:${ihw}px;height:${ihh}px;display:flex;justify-content:center;align-items:center;z-index:10;pointer-events:none;font-family:${s.fontFamily};font-size:${s.fontSize}px;font-weight:${s.fontWeight};color:${s.fontColor};transform:translate(${s.fontX}px,${s.fontY}px);line-height:1;text-align:center;transition:opacity 80ms}.rocker-text-top{top:0;left:0}.rocker-text-bot{top:-${topH + s.gap}px;left:0}`;
      }

      let lastStructKey = "",
        rebuildTimeout = null;
      function applySettings(forceRebuild) {
        boardArea.style.backgroundColor = S.previewBg;
        const sk = `${S.cols}|${S.rows}|${S.ridgeCount}`;
        if (sk !== lastStructKey || forceRebuild) {
          cancelAnimLoop();
          isFlipping = false;
          boardWrapper.classList.add("fading");
          clearTimeout(rebuildTimeout);
          rebuildTimeout = setTimeout(() => {
            currentChars = blankGrid();
            renderBoard();
            dynamicCSS.textContent = buildDynamicCSS();
            if (S.autoFit) applyAutoFit();
            requestAnimationFrame(() => {
              boardWrapper.classList.remove("fading");
            });
          }, 250);
          lastStructKey = sk;
        } else {
          dynamicCSS.textContent = buildDynamicCSS();
          if (S.autoFit) requestAnimationFrame(applyAutoFit);
        }
      }
      function applyAutoFit() {
        if (!S.autoFit) return;
        const grid = boardWrapper.querySelector(".vestaboard-grid");
        if (!grid) return;
        boardWrapper.style.transform = "none";
        boardWrapper.style.width = "";
        boardWrapper.style.height = "";
        requestAnimationFrame(() => {
          const bw = grid.offsetWidth,
            bh = grid.offsetHeight;
          if (!bw || !bh) return;
          const rect = boardArea.getBoundingClientRect();
          const fr = Math.min(rect.width / bw, rect.height / bh);
          boardWrapper.style.width = bw + "px";
          boardWrapper.style.height = bh + "px";
          boardWrapper.style.transform = `scale(${Math.min(fr, 2)})`;
        });
      }
      window.addEventListener("resize", () => {
        if (S.autoFit) requestAnimationFrame(applyAutoFit);
        requestAnimationFrame(generateSubmitQR);
      });

      // ═══════════════════════════════════
      // QR CODE
      // ═══════════════════════════════════
      function drawQR(container, url, size, useFrame) {
        container.innerHTML = "";
        const qr = qrcode(0, "M");
        qr.addData(url);
        qr.make();
        const mods = qr.getModuleCount(),
          cellSize = size / mods;
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, size, size);
        ctx.fillStyle = "#000";
        for (let r = 0; r < mods; r++)
          for (let c = 0; c < mods; c++) {
            if (qr.isDark(r, c))
              ctx.fillRect(
                c * cellSize,
                r * cellSize,
                cellSize + 0.5,
                cellSize + 0.5,
              );
          }
        const parent = useFrame
          ? (() => {
              const frame = document.createElement("div");
              frame.className = "submit-qr-frame";
              container.appendChild(frame);
              return frame;
            })()
          : container;
        parent.appendChild(canvas);
      }

      function generateSubmitQR() {
        const container = document.getElementById("submit-qr-container");
        const url = `${location.origin}/submit.html`;
        const panel = document.getElementById("submit-qr-panel");
        const pad = 80;
        const size = Math.max(
          320,
          Math.min(
            panel.clientWidth - pad,
            panel.clientHeight - pad - 60,
          ),
        );
        drawQR(container, url, size, true);
      }

      function clearPublicQueueTimer() {
        if (publicQueueTimer) {
          clearTimeout(publicQueueTimer);
          publicQueueTimer = null;
        }
      }

      function finishPublicMessage(id) {
        publicQueuePlaying = false;
        clearPublicQueueTimer();
        if (ws && ws.readyState === 1) {
          ws.send(JSON.stringify({ type: "public_message_done", id }));
        }
      }

      function playPublicMessage(text, durationMs, id) {
        publicQueuePlaying = true;
        clearPublicQueueTimer();
        const ms = durationMs || publicDisplayMs;
        flipToTarget(messageToGrid(text.toUpperCase()), () => {
          publicQueueTimer = setTimeout(() => finishPublicMessage(id), ms);
        });
      }

      let ws = null,
        reconnectTimer = null;

      function connectWS() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${proto}//${location.host}`);
        ws.onopen = () => {
          ws.send(JSON.stringify({ type: "register_board" }));
        };
        ws.onmessage = (e) => {
          let msg;
          try {
            msg = JSON.parse(e.data);
          } catch (_) {
            return;
          }
          if (msg.type === "registered") {
            generateSubmitQR();
          }
          if (msg.type === "play_public_message" && typeof msg.text === "string") {
            getAudioCtx();
            playPublicMessage(msg.text, msg.durationMs, msg.id);
          }
        };
        ws.onclose = () => {
          clearTimeout(reconnectTimer);
          reconnectTimer = setTimeout(connectWS, 3000);
        };
        ws.onerror = () => ws.close();
      }

      document.addEventListener("keydown", (e) => {
        if (e.key.toLowerCase() === "f") {
          if (!document.fullscreenElement)
            document.documentElement.requestFullscreen().catch(() => {});
          else document.exitFullscreen();
        }
        if (e.key.toLowerCase() === "m") {
          S.soundVolume = S.soundVolume > 0 ? 0 : 0.8;
        }
      });
      document.addEventListener("click", () => getAudioCtx(), { once: true });

      renderBoard();
      applySettings(true);
      loadClickWav();
      generateSubmitQR();
      connectWS();
    </script>
  </body>
</html>
